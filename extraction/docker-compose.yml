services:
  postgres:
    image: postgres:16
    container_name: bio_geo_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: bio_geo_guesser
    volumes:
      - bio_geo_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  bio_geo_postgres_data:
